<!DOCTYPE html>
<html>
<head>
<title>SMM Panel</title>
<style>
body{background:#0f172a;color:#fff;text-align:center;font-family:Arial}
.box{background:#1e293b;margin:20px auto;padding:20px;width:300px;border-radius:10px}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#22c55e}
</style>
</head>
<body>

<h1>🚀 My SMM Panel</h1>

<div class="box">
<h3>Register</h3>
<input id="ru" placeholder="Username"><br>
<input id="rp" type="password" placeholder="Password"><br>
<button onclick="register()">Register</button>
</div>

<div class="box">
<h3>Login</h3>
<input id="lu" placeholder="Username"><br>
<input id="lp" type="password" placeholder="Password"><br>
<button onclick="login()">Login</button>
</div>

<div class="box">
<h3>Add Balance</h3>
<input id="amt" placeholder="Amount"><br>
<button onclick="addBalance()">Add</button>
</div>

<div class="box">
<h3>Place Order</h3>
<input id="service" placeholder="Service"><br>
<input id="link" placeholder="Link"><br>
<input id="price" placeholder="Price"><br>
<button onclick="buy()">Order</button>
</div>

<div class="box">
<button onclick="loadOrders()">My Orders</button>
<pre id="orders"></pre>
</div>

<script>
let token="";

function register(){
fetch('/register',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({username:ru.value,password:rp.value})})
.then(r=>r.json()).then(d=>alert(d.msg));
}

function login(){
fetch('/login',{method:'POST',headers:{'Content-Type':'application/json'},
body:JSON.stringify({username:lu.value,password:lp.value})})
.then(r=>r.json()).then(d=>{token=d.token; alert('Logged in');});
}

function addBalance(){
fetch('/add-balance',{method:'POST',
headers:{'Content-Type':'application/json','Authorization':token},
body:JSON.stringify({amount:Number(amt.value)})})
.then(r=>r.json()).then(d=>alert(d.msg));
}

function buy(){
fetch('/buy',{method:'POST',
headers:{'Content-Type':'application/json','Authorization':token},
body:JSON.stringify({
service:service.value,
link:link.value,
price:Number(price.value)
})})
.then(r=>r.json()).then(d=>alert(d.msg));
}

function loadOrders(){
fetch('/my-orders',{headers:{Authorization:token}})
.then(r=>r.json()).then(d=>orders.innerText=JSON.stringify(d,null,2));
}
</script>

</body>
</html>
